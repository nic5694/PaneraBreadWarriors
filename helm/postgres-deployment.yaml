apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:18
        imagePullPolicy: IfNotPresent
        args:
        - -c
        - max_connections=1000
        - -c
        - shared_buffers=1GB
        - -c
        - effective_cache_size=3GB
        - -c
        - maintenance_work_mem=256MB
        - -c
        - checkpoint_completion_target=0.9
        - -c
        - wal_buffers=16MB
        - -c
        - default_statistics_target=100
        - -c
        - random_page_cost=1.1
        - -c
        - effective_io_concurrency=200
        - -c
        - work_mem=4MB
        - -c
        - huge_pages=off
        - -c
        - jit=off
        - -c
        - wal_compression=lz4
        - -c
        - io_method=io_uring
        - -c
        - min_wal_size=1GB
        - -c
        - max_wal_size=4GB
        ports:
        - containerPort: 5432
          protocol: TCP
        env:
        - name: POSTGRES_DB
          value: hackathon_db
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "3000m"
            memory: "4Gi"
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - pg_isready -U postgres -d hackathon_db
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - pg_isready -U postgres -d hackathon_db
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
