apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16
        imagePullPolicy: IfNotPresent
        args:
        - -c
        - max_connections=200
        - -c
        - shared_buffers=512MB
        - -c
        - effective_cache_size=1536MB
        - -c
        - work_mem=8MB
        - -c
        - maintenance_work_mem=256MB
        - -c
        - wal_buffers=16MB
        - -c
        - checkpoint_timeout=15min
        - -c
        - checkpoint_completion_target=0.9
        - -c
        - max_wal_size=2GB
        - -c
        - min_wal_size=512MB
        - -c
        - wal_compression=on
        - -c
        - synchronous_commit=off
        - -c
        - autovacuum_naptime=10s
        - -c
        - autovacuum_vacuum_scale_factor=0.05
        - -c
        - autovacuum_analyze_scale_factor=0.02
        ports:
        - containerPort: 5432
          protocol: TCP
        env:
        - name: POSTGRES_DB
          value: hackathon_db
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "3000m"
            memory: "4Gi"
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - pg_isready -U postgres -d hackathon_db
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - pg_isready -U postgres -d hackathon_db
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
