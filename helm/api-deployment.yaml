apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: deployment
  name: deployment
spec:
  minReadySeconds: 10
  selector:
    matchLabels:
      app: deployment
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 2
  template:
    metadata:
      labels:
        app: deployment
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - image: nic5694/pe-engineering-hackathon:latest
        imagePullPolicy: Always
        name: api
        env:
        - name: DATABASE_NAME
          value: hackathon_db
        - name: DATABASE_HOST
          value: pgbouncer
        - name: DATABASE_PORT
          value: "6432"
        - name: DATABASE_USER
          value: postgres
        - name: DATABASE_PASSWORD
          value: postgres
        - name: DATABASE_MAX_CONNECTIONS
          value: "40"
        - name: DATABASE_STALE_TIMEOUT
          value: "300"
        - name: DATABASE_TIMEOUT
          value: "10"
        - name: FLASK_DEBUG
          value: "false"
        - name: REDIS_URL
          value: redis://redis:6379/0
        - name: REDIS_CACHE_ENABLED
          value: "true"
        - name: REDIS_CACHE_TTL_SECONDS
          value: "120"
        ports:
        - containerPort: 5000
          protocol: TCP
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        startupProbe:
          httpGet:
            path: /ready
            port: 5000
          failureThreshold: 30
          periodSeconds: 5
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 6
          successThreshold: 2
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 3
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 10"]
